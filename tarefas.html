<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Régua de Cobrança — Sistema de Cobrança</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .regua-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--border-color);
      box-shadow: var(--shadow-md);
      margin-bottom: 16px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .regua-card:hover { box-shadow: var(--shadow-lg); }
    .regua-card-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      background: var(--gray-50);
      border-bottom: 1px solid var(--border-color);
    }
    [data-theme="dark"] .regua-card-header { background: rgba(255,255,255,0.03); }
    .regua-steps {
      padding: 16px 20px;
      display: none;
    }
    .regua-card.expanded .regua-steps { display: block; }
    .step-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
      position: relative;
    }
    .step-row:last-child { border-bottom: none; }
    .step-day {
      min-width: 60px;
      text-align: center;
      background: var(--blue-100);
      color: var(--blue-700);
      border-radius: var(--radius-sm);
      padding: 4px 8px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .step-day.negativacao { background: var(--red-100); color: var(--red-600); }
    .step-day.protesto    { background: var(--orange-100); color: var(--orange-500); }
    .step-day.judicial    { background: #f3e8ff; color: #7c3aed; }
    .step-canal {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 90px;
    }
    .step-canal span { font-size: 0.8rem; font-weight: 600; }
    .step-msg { font-size: 0.82rem; color: var(--text-secondary); flex: 1; }
    .canal-icon { font-size: 1.1rem; }
    .toggle-btn-regua {
      transition: transform 0.2s;
    }
    .regua-card.expanded .toggle-btn-regua { transform: rotate(180deg); }

    /* Step Builder */
    .step-builder {
      background: var(--bg-card);
      border: 1.5px dashed var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 12px;
    }
    .locked-msg {
      background: var(--red-100);
      color: var(--red-600);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
<script src="js/db.js"></script>
<script src="js/utils.js"></script>

<div class="page-container">

  <div class="flex-between mb-6" style="flex-wrap:wrap;gap:12px">
    <div>
      <h1 class="page-title">Régua de Cobrança</h1>
      <p class="page-subtitle">Gerencie as réguas inteligentes e personalizadas</p>
    </div>
    <button class="btn btn-primary" id="btn-nova-regua" onclick="openModalNovaRegua()">
      + Nova Régua
    </button>
  </div>

  <!-- Tabs -->
  <div class="tabs-nav" id="regua-tabs">
    <button class="tab-btn active" onclick="switchTab('inteligentes', this)">🤖 Réguas Inteligentes (Gerência)</button>
    <button class="tab-btn" onclick="switchTab('personalizadas', this)">✍️ Réguas Personalizadas (Cobradoras)</button>
  </div>

  <!-- Inteligentes -->
  <div class="tab-content active" id="tab-inteligentes">
    <div id="lista-inteligentes"></div>
  </div>

  <!-- Personalizadas -->
  <div class="tab-content" id="tab-personalizadas">
    <div id="lista-personalizadas"></div>
  </div>

</div>

<!-- Modal: Nova Régua -->
<div class="modal-overlay" id="modal-nova-regua">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-regua-title">Nova Régua</h3>
      <button class="modal-close" onclick="Modal.close('modal-nova-regua')">&times;</button>
    </div>
    <div class="modal-body" id="modal-regua-body">
      <div class="form-group">
        <label class="form-label">Nome da Régua</label>
        <input class="form-control" id="regua-nome" type="text" placeholder="Ex: Régua Agressiva 30+ dias">
      </div>
      <div class="form-group" id="form-tipo-wrap">
        <label class="form-label">Tipo</label>
        <select class="form-control" id="regua-tipo">
          <option value="personalizada">Personalizada (para minha carteira)</option>
          <option value="inteligente" id="opt-inteligente">Inteligente (para todas as cobradoras)</option>
        </select>
      </div>
      <hr class="section-divider">
      <div class="flex-between mb-4">
        <h4>Passos da Régua</h4>
        <button class="btn btn-primary btn-sm" onclick="addStepForm()">+ Adicionar Passo</button>
      </div>
      <div id="steps-container"></div>
      <div id="locked-channels-info" class="locked-msg mt-2" style="display:none">
        🔒 Mensagens de negativação, protesto e ação judicial só ficam disponíveis após 45 dias de atraso.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('modal-nova-regua')">Cancelar</button>
      <button class="btn btn-success" onclick="salvarRegua()">💾 Salvar Régua</button>
    </div>
  </div>
</div>

<script>
buildNav('regua');

const user = DB.getCurrentUser();
const isGerente = user.role === 'gerente';

let editingReguaId = null;
let steps = [];

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── Render Lists ───────────────────────────────────────────────
function renderListas() {
  renderInteligentes();
  renderPersonalizadas();
  // Hide "inteligente" option if not gerente
  const opt = document.getElementById('opt-inteligente');
  if (opt) opt.style.display = isGerente ? '' : 'none';
}

function renderInteligentes() {
  const reguas = DB.getReguasInteligentes();
  const el = document.getElementById('lista-inteligentes');
  if (!reguas.length) {
    el.innerHTML = `<div class="empty-state"><p>Nenhuma régua inteligente cadastrada.</p></div>`;
    return;
  }
  el.innerHTML = reguas.map(r => reguaCardHTML(r, true)).join('');
  bindReguaCards();
}

function renderPersonalizadas() {
  const reguas = DB.getReguasPersonalizadas(isGerente ? null : user.id);
  const el = document.getElementById('lista-personalizadas');
  if (!reguas.length) {
    el.innerHTML = `<div class="empty-state"><p>Nenhuma régua personalizada cadastrada.</p></div>`;
    return;
  }
  el.innerHTML = reguas.map(r => reguaCardHTML(r, false)).join('');
  bindReguaCards();
}

function canalIcon(canal) {
  return { whatsapp: '📱', sms: '💬', ligacao: '📞', email: '📧', negativacao: '🚨', protesto: '📜', judicial: '⚖️' }[canal] || '📌';
}

function canalLabel(canal) {
  return { whatsapp: 'WhatsApp', sms: 'SMS', ligacao: 'Ligação', email: 'E-mail', negativacao: 'Negativação', protesto: 'Protesto', judicial: 'Ação Judicial' }[canal] || canal;
}

function reguaCardHTML(r, isInteligente) {
  const canEdit = isGerente || (!isInteligente);
  return `
    <div class="regua-card" id="regua-${r.id}" data-id="${r.id}">
      <div class="regua-card-header" onclick="toggleRegua(${r.id})">
        <div class="flex gap-3" style="align-items:center">
          <span style="font-size:1.2rem">${isInteligente ? '🤖' : '✍️'}</span>
          <div>
            <div style="font-weight:700">${r.nome}</div>
            <div class="text-xs text-muted">${r.passos?.length || 0} passo(s) • Criado por: ${r.criado_por || 'Cobradora'}</div>
          </div>
        </div>
        <div class="flex gap-2" style="align-items:center">
          <span class="badge ${r.ativo ? 'badge-green' : 'badge-gray'}">${r.ativo ? 'Ativa' : 'Inativa'}</span>
          ${canEdit ? `
            <button class="btn btn-ghost btn-sm" onclick="editRegua(event,${r.id})">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRegua(event,${r.id})">🗑️</button>
          ` : ''}
          <span class="toggle-btn-regua">▼</span>
        </div>
      </div>
      <div class="regua-steps">
        ${(r.passos || []).map(p => `
          <div class="step-row">
            <div class="step-day ${p.canal}">${p.dia}° dia</div>
            <div class="step-canal">
              <span class="canal-icon">${canalIcon(p.canal)}</span>
              <span>${canalLabel(p.canal)}</span>
            </div>
            <div class="step-msg">${p.mensagem}</div>
          </div>
        `).join('')}
        ${!r.passos?.length ? '<p class="text-muted text-sm">Nenhum passo definido.</p>' : ''}
      </div>
    </div>
  `;
}

function bindReguaCards() {}

function toggleRegua(id) {
  const card = document.getElementById(`regua-${id}`);
  if (card) card.classList.toggle('expanded');
}

function deleteRegua(e, id) {
  e.stopPropagation();
  if (!confirm('Excluir esta régua?')) return;
  DB.deleteRegua(id);
  Toast.success('Régua excluída.');
  renderListas();
}

function editRegua(e, id) {
  e.stopPropagation();
  const allReguas = [...DB.getReguasInteligentes(), ...DB.getReguasPersonalizadas()];
  const regua = allReguas.find(r => r.id === id);
  if (!regua) return;

  editingReguaId = id;
  document.getElementById('modal-regua-title').textContent = 'Editar Régua';
  document.getElementById('regua-nome').value = regua.nome;
  document.getElementById('regua-tipo').value = regua.tipo;
  steps = (regua.passos || []).map((p, i) => ({ ...p, _idx: i }));
  renderStepForms();
  Modal.open('modal-nova-regua');
}

// ── Nova Régua ─────────────────────────────────────────────────
function openModalNovaRegua() {
  editingReguaId = null;
  document.getElementById('modal-regua-title').textContent = 'Nova Régua de Cobrança';
  document.getElementById('regua-nome').value = '';
  document.getElementById('regua-tipo').value = 'personalizada';
  steps = [];
  renderStepForms();
  Modal.open('modal-nova-regua');
}

let stepIdx = 0;
function addStepForm(step = null) {
  const idx = stepIdx++;
  steps.push({ dia: step?.dia || '', canal: step?.canal || 'whatsapp', mensagem: step?.mensagem || '', _idx: idx });
  renderStepForms();
}

function removeStep(idx) {
  steps = steps.filter(s => s._idx !== idx);
  renderStepForms();
}

function getLockedChannels(dia) {
  return parseInt(dia) < 45 ? ['negativacao', 'protesto', 'judicial'] : [];
}

function renderStepForms() {
  const cont = document.getElementById('steps-container');
  if (!steps.length) {
    cont.innerHTML = `<div class="empty-state"><p>Nenhum passo adicionado. Clique em "+ Adicionar Passo".</p></div>`;
    return;
  }
  cont.innerHTML = steps.map((s) => {
    const dia = parseInt(s.dia) || 0;
    const locked = getLockedChannels(dia);
    const canais = [
      { value: 'whatsapp', label: '📱 WhatsApp' },
      { value: 'sms',      label: '💬 SMS' },
      { value: 'ligacao',  label: '📞 Ligação' },
      { value: 'email',    label: '📧 E-mail' },
      { value: 'negativacao', label: '🚨 Negativação (45+ dias)' },
      { value: 'protesto',    label: '📜 Protesto (45+ dias)' },
      { value: 'judicial',    label: '⚖️ Ação Judicial (45+ dias)' },
    ];
    return `
      <div class="step-builder">
        <div class="flex-between mb-4">
          <span class="font-bold text-sm">Passo ${s._idx + 1}</span>
          <button class="btn btn-danger btn-sm" onclick="removeStep(${s._idx})">Remover</button>
        </div>
        <div class="grid-3" style="gap:12px;margin-bottom:12px">
          <div class="form-group" style="margin:0">
            <label class="form-label">Dia de Atraso</label>
            <input class="form-control" type="number" min="1" value="${s.dia}"
              onchange="updateStep(${s._idx},'dia',this.value)" placeholder="Ex: 5">
          </div>
          <div class="form-group" style="margin:0;grid-column:span 2">
            <label class="form-label">Canal</label>
            <select class="form-control" onchange="updateStep(${s._idx},'canal',this.value)">
              ${canais.map(c => `
                <option value="${c.value}" ${s.canal === c.value ? 'selected' : ''} ${locked.includes(c.value) ? 'disabled' : ''}>${c.label}</option>
              `).join('')}
            </select>
          </div>
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Mensagem / Instrução</label>
          <textarea class="form-control" rows="2"
            onchange="updateStep(${s._idx},'mensagem',this.value)"
            placeholder="Use {nome}, {dias}, {link} como variáveis...">${s.mensagem}</textarea>
        </div>
        ${locked.includes(s.canal) ? `<div class="locked-msg mt-2">🔒 Canal "${canalLabel(s.canal)}" requer mínimo de 45 dias de atraso.</div>` : ''}
      </div>
    `;
  }).join('');

  // Show/hide locked info banner
  document.getElementById('locked-channels-info').style.display = steps.some(s => parseInt(s.dia) < 45) ? 'flex' : 'none';
}

function updateStep(idx, field, value) {
  const step = steps.find(s => s._idx === idx);
  if (step) step[field] = value;
  if (field === 'dia') renderStepForms();
}

function salvarRegua() {
  const nome = document.getElementById('regua-nome').value.trim();
  const tipo = document.getElementById('regua-tipo').value;
  if (!nome) { Toast.error('Informe o nome da régua.'); return; }
  if (!steps.length) { Toast.error('Adicione pelo menos um passo.'); return; }

  // Validate locked channels
  for (const s of steps) {
    const locked = getLockedChannels(s.dia);
    if (locked.includes(s.canal)) {
      Toast.error(`Passo ${s._idx+1}: canal "${canalLabel(s.canal)}" só disponível após 45 dias.`);
      return;
    }
  }

  const passos = steps.map(({ dia, canal, mensagem }) => ({ dia: parseInt(dia), canal, mensagem }));

  if (editingReguaId) {
    DB.updateRegua(editingReguaId, { nome, tipo, passos });
    Toast.success('Régua atualizada!');
  } else {
    DB.addRegua({
      nome, tipo, passos,
      criado_por: isGerente ? 'Gerência' : user.nome,
      ativo: true,
      cobradora_id: isGerente ? null : user.id,
    });
    Toast.success('Régua criada com sucesso!');
  }

  Modal.close('modal-nova-regua');
  renderListas();
}

renderListas();
Modal.closeOnOverlayClick('modal-nova-regua');
// Update step index counter
stepIdx = 0;
</script>
</body>
</html>
