<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário de Recebimentos — Sistema de Cobrança</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .cal-header-day {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 8px 0;
    }
    .cal-day {
      background: var(--bg-card);
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-sm);
      min-height: 72px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .cal-day:hover:not(.empty) { border-color: var(--blue-500); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
    .cal-day.today { border-color: var(--blue-500); border-width: 2px; }
    .cal-day.has-data { background: linear-gradient(135deg, var(--blue-50), #fff); }
    .cal-day.weekend { background: var(--gray-50); }
    [data-theme="dark"] .cal-day.weekend { background: rgba(255,255,255,0.02); }
    .day-num {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .day-num.today-num { color: var(--blue-600); }
    .day-value {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--green-600);
      margin-top: 4px;
    }
    .day-bar {
      position: absolute;
      bottom: 6px;
      left: 6px; right: 6px;
      height: 3px;
      border-radius: 99px;
      background: var(--blue-400);
    }
    .month-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .month-nav button {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--border-color);
      background: var(--bg-card);
      cursor: pointer;
      font-size: 1rem;
      display: flex;align-items:center;justify-content:center;
      transition: all 0.15s;
    }
    .month-nav button:hover { border-color: var(--blue-500); color: var(--blue-600); }
    .month-title { font-size: 1.1rem; font-weight: 700; min-width: 160px; text-align:center; }
  </style>
</head>
<body>
<script src="js/db.js"></script>
<script src="js/utils.js"></script>

<div class="page-container">

  <!-- Header -->
  <div class="flex-between mb-6">
    <div>
      <h1 class="page-title">Calendário de Recebimentos</h1>
      <p class="page-subtitle">Visualize os recebimentos dia a dia</p>
    </div>
    <div class="flex gap-2">
      <div class="filter-bar" style="margin:0;padding:10px 14px">
        <div class="filter-group">
          <label>Carteira</label>
          <select id="filtro-carteira" onchange="renderCalendar()">
            <option value="">Todas</option>
            <option value="ATUAL">Atual</option>
            <option value="ATRASADO">Atrasado</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Cobradora</label>
          <select id="filtro-cobradora" onchange="renderCalendar()">
            <option value="">Todas</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Summary Cards -->
  <div class="grid-4 mb-6" id="cal-summary"></div>

  <!-- Calendar Card -->
  <div class="card">
    <div class="card-header">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="month-title" id="month-title"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <span class="text-sm text-muted" id="cal-total-mes"></span>
    </div>
    <div class="card-body">
      <div class="calendar-grid" id="cal-headers"></div>
      <div style="height:8px"></div>
      <div class="calendar-grid" id="cal-grid"></div>
    </div>
  </div>

</div>

<!-- Modal: Detalhe do Dia -->
<div class="modal-overlay" id="modal-dia">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-dia-title">Recebimentos do Dia</h3>
      <button class="modal-close" onclick="Modal.close('modal-dia')">&times;</button>
    </div>
    <div class="modal-body" id="modal-dia-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('modal-dia')">Fechar</button>
    </div>
  </div>
</div>

<!-- Modal: Total do Mês -->
<div class="modal-overlay" id="modal-mes-total">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Total Recebido do Mês</h3>
      <button class="modal-close" onclick="Modal.close('modal-mes-total')">&times;</button>
    </div>
    <div class="modal-body" id="modal-mes-total-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('modal-mes-total')">Fechar</button>
    </div>
  </div>
</div>

<script>
buildNav('calendario');

// Populate cobradora filter
const cobradoras = DB.getCobradoras();
const selCob = document.getElementById('filtro-cobradora');
cobradoras.forEach(c => {
  selCob.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
});

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;

const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  renderCalendar();
}

function renderSummary(recebimentos) {
  const valores = Object.values(recebimentos).map(d => d.total);
  const total = valores.reduce((s,v) => s+v, 0);
  const diasComRecebimento = valores.length;
  const melhorDia = Math.max(...valores, 0);
  const mediasDias = diasComRecebimento > 0 ? total / diasComRecebimento : 0;
  const meta = DB.getConfigMeta();
  const pctMeta = total / meta.atual.total * 100;

  document.getElementById('cal-summary').innerHTML = `
    <div class="stat-card stat-card-blue" onclick="openMesTotalModal()" style="cursor:pointer">
      <div class="stat-label">Total Recebido no Mês</div>
      <div class="stat-value">${fmt.moeda(total)}</div>
      <div class="stat-sub">${fmt.pct(pctMeta)} da meta • clique para detalhes</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Dias com Recebimento</div>
      <div class="stat-value">${diasComRecebimento}</div>
      <div class="stat-sub">dias úteis com registro</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Melhor Dia</div>
      <div class="stat-value" style="font-size:1.2rem">${fmt.moeda(melhorDia)}</div>
      <div class="stat-sub">maior valor registrado</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Média por Dia</div>
      <div class="stat-value" style="font-size:1.2rem">${fmt.moeda(mediasDias)}</div>
      <div class="stat-sub">média dos dias com registro</div>
    </div>
  `;
}

function renderCalendar() {
  const recebimentos = DB.getRecebimentos(currentYear, currentMonth);
  const totalMes = Object.values(recebimentos).reduce((s,d) => s+d.total, 0);
  const maxVal = Math.max(...Object.values(recebimentos).map(d => d.total), 1);

  document.getElementById('month-title').textContent = `${MONTHS_PT[currentMonth-1]} ${currentYear}`;
  document.getElementById('cal-total-mes').textContent = `Total: ${fmt.moeda(totalMes)}`;

  renderSummary(recebimentos);

  // Headers
  document.getElementById('cal-headers').innerHTML = DAYS_PT.map(d => `<div class="cal-header-day">${d}</div>`).join('');

  // Grid
  const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const today = new Date();
  let html = '';

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-day empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(currentYear, currentMonth - 1, d);
    const isToday = dt.toDateString() === today.toDateString();
    const isWeekend = dt.getDay() === 0 || dt.getDay() === 6;
    const data = recebimentos[d];
    const hasData = !!data;
    const barWidth = hasData ? Math.max((data.total / maxVal) * 100, 8) : 0;

    html += `
      <div class="cal-day ${isWeekend ? 'weekend' : ''} ${hasData ? 'has-data' : ''} ${isToday ? 'today' : ''}"
           onclick="${hasData ? `openDayModal(${d})` : ''}">
        <div class="day-num ${isToday ? 'today-num' : ''}">${d}</div>
        ${hasData ? `<div class="day-value">${fmt.moeda(data.total).replace('R$','')}</div>` : ''}
        ${hasData ? `<div class="day-bar" style="width:${barWidth}%"></div>` : ''}
      </div>
    `;
  }

  document.getElementById('cal-grid').innerHTML = html;
}

function openDayModal(day) {
  const recebimentos = DB.getRecebimentos(currentYear, currentMonth);
  const data = recebimentos[day];
  if (!data) return;

  document.getElementById('modal-dia-title').textContent = `Recebimentos — ${day} de ${MONTHS_PT[currentMonth-1]}`;
  document.getElementById('modal-dia-body').innerHTML = `
    <div class="stat-card stat-card-blue mb-4" style="text-align:center">
      <div class="stat-label">Total do Dia</div>
      <div class="stat-value" style="font-size:1.8rem">${fmt.moeda(data.total)}</div>
    </div>
    <h4 style="margin-bottom:12px;font-size:0.85rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Por mês de referência</h4>
    ${data.detalhes.map(d => `
      <div class="flex-between" style="padding:12px 0;border-bottom:1px solid var(--border-color)">
        <div>
          <div style="font-weight:600">${d.mes_referencia}</div>
          <div class="text-xs text-muted">Recebimentos de competência</div>
        </div>
        <span class="text-mono" style="font-weight:600;color:var(--green-600)">${fmt.moeda(d.valor)}</span>
      </div>
    `).join('')}
  `;
  Modal.open('modal-dia');
}

function openMesTotalModal() {
  const recebimentos = DB.getRecebimentos(currentYear, currentMonth);
  const total = Object.values(recebimentos).reduce((s,d) => s+d.total, 0);
  const meses = {};
  Object.values(recebimentos).forEach(d => {
    d.detalhes.forEach(det => {
      meses[det.mes_referencia] = (meses[det.mes_referencia] || 0) + det.valor;
    });
  });

  document.getElementById('modal-mes-total-body').innerHTML = `
    <div class="stat-card stat-card-blue mb-4" style="text-align:center">
      <div class="stat-label">Total Recebido — ${MONTHS_PT[currentMonth-1]} ${currentYear}</div>
      <div class="stat-value" style="font-size:1.8rem">${fmt.moeda(total)}</div>
    </div>
    <h4 style="margin-bottom:12px;font-size:0.85rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Detalhamento por mês de referência</h4>
    ${Object.entries(meses).map(([m, v]) => `
      <div class="flex-between" style="padding:12px 0;border-bottom:1px solid var(--border-color)">
        <div>
          <div style="font-weight:600">${m}</div>
          <div class="text-xs text-muted">${fmt.pct((v/total)*100)} do total</div>
        </div>
        <span class="text-mono" style="font-weight:600;color:var(--green-600)">${fmt.moeda(v)}</span>
      </div>
    `).join('')}
  `;
  Modal.open('modal-mes-total');
}

renderCalendar();
Modal.closeOnOverlayClick('modal-dia');
Modal.closeOnOverlayClick('modal-mes-total');
</script>
</body>
</html>
